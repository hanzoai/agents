name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      # control-plane is mid-rebrand (74 files of identifier rot from
      # the March mass rename). Build only the Go SDK until the
      # control-plane gets its dedicated cleanup pass — tracked in
      # the agents repo issues.
      - name: Build Go SDK
        run: cd sdk/go && go build ./...

      - name: Test SDK
        run: cd sdk/go && go test ./...

  typescript:
    name: TypeScript Build & Test (advisory)
    # ADVISORY: TypeScript SDK + workspace has accumulated drift since
    # the March mass rename + multi-agent consensus app landed without
    # a workspace-wide build run. Failures here do NOT block the Go
    # SDK release. Tracked: agents repo issues for "ts-sdk type rot".
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Workaround for https://github.com/npm/cli/issues/4828
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --no-audit

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

  lint:
    name: Lint (advisory)
    # ADVISORY: biome rules accumulated faster than the workspace was
    # cleaned. See typescript job comment.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --no-audit

      - name: Biome check
        run: npm run check
