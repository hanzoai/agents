name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build control-plane
        run: cd control-plane && go build ./...

      - name: Build Go SDK
        run: cd sdk/go && go build ./...

      - name: Test
        run: make test

  typescript:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Workaround for https://github.com/npm/cli/issues/4828
      # `npm ci` doesn't install rollup's optional platform deps
      # consistently. Use `npm install --force` to refresh and let
      # platform-specific binaries land.
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --no-audit

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --no-audit

      - name: Biome check
        run: npm run check
