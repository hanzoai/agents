name: Publish npm

on:
  push:
    tags: ['v*', 'hanzo-agents-*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish @hanzo/agents to npm
    runs-on: hanzo-build-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Workaround for npm/cli#4828: clean install so rollup's optional
      # native dep (@rollup/rollup-linux-x64-gnu) is fetched. --ignore-scripts
      # also skips the postinstall that pulls the binary, so we drop it here.
      - name: Install workspace
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --no-audit --no-fund

      - name: Build SDK
        working-directory: sdk/typescript
        run: npx tsup

      - name: Publish to npm
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --ignore-scripts
